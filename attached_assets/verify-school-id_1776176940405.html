<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasabay — Verify School ID</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone phone--teal" style="background:linear-gradient(180deg, #0a7d5c 0%, #086b4e 100%);">
    <!-- Status Bar -->
    <div class="status-bar status-bar--light">
      <span class="status-bar__time">9:41</span>
      <div class="status-dots">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot"></span>
      </div>
    </div>

    <!-- Header -->
    <div style="text-align:center;padding:8px 20px 4px;">
      <h1 style="font-size:22px;font-weight:700;color:#fff;">Verify your school ID</h1>
      <p style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:4px;">Step 1 of 2</p>
    </div>

    <!-- Step Indicator -->
    <div class="step-indicator">
      <div class="step-indicator__bar step-indicator__bar--active"></div>
      <div class="step-indicator__bar"></div>
    </div>

    <!-- Camera Area -->
    <div class="camera-area" style="flex:1;">
      <!-- Camera Frame -->
      <div class="camera-frame camera-frame--animate" style="width:280px;height:200px;">
        <span class="camera-frame__text">Align your USC ID<br>within the frame</span>
        <div class="camera-frame__icon">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="13" r="4"/>
            <path d="M5 7h2l2-3h6l2 3h2a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"/>
          </svg>
        </div>
      </div>

      <!-- Tips -->
      <div class="camera-tips">
        <div class="camera-tip">
          <div class="camera-tip__icon">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2m0 18v2m-11-11h2m18 0h2"/>
            </svg>
          </div>
          <span class="camera-tip__text">Use a well-lit room and avoid glare on your ID</span>
        </div>
        <div class="camera-tip">
          <div class="camera-tip__icon">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <span class="camera-tip__text">Hold your phone steady until the photo is taken</span>
        </div>
      </div>
    </div>

    <!-- Bottom Buttons -->
    <div style="padding:0 20px 40px;">
      <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;margin-bottom:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="13" r="4"/>
          <path d="M5 7h2l2-3h6l2 3h2a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"/>
        </svg>
        Take photo
      </button>
      <button class="btn btn--ghost" style="color:rgba(255,255,255,0.6);">Enter manually instead</button>
    </div>
  </div>
</body>
</html>
