<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasabay — Welcome</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .welcome-illustration {
      width: 200px;
      height: 200px;
      margin: 20px 0;
    }
    .welcome-features {
      display: flex;
      gap: 16px;
      padding: 24px 24px 0;
    }
    .welcome-feature {
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .welcome-feature__icon {
      width: 44px;
      height: 44px;
      background: var(--primary-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome-feature__icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
    }
    .welcome-feature__text {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <div class="status-dots">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot"></span>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="auth-hero" style="padding-top:20px;">
      <!-- Illustration -->
      <svg class="welcome-illustration" viewBox="0 0 200 200" fill="none">
        <!-- Map circle background -->
        <circle cx="100" cy="100" r="90" fill="#E1F5EE"/>
        <circle cx="100" cy="100" r="70" fill="#f0faf6"/>
        
        <!-- Road lines -->
        <line x1="40" y1="100" x2="160" y2="100" stroke="#0D9E75" stroke-width="2" opacity="0.2"/>
        <line x1="100" y1="40" x2="100" y2="160" stroke="#0D9E75" stroke-width="2" opacity="0.2"/>
        <line x1="55" y1="55" x2="145" y2="145" stroke="#0D9E75" stroke-width="1.5" opacity="0.1"/>
        
        <!-- Route -->
        <path d="M70 130 Q100 90 130 70" stroke="#0D9E75" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6 4"/>
        
        <!-- Pin A -->
        <circle cx="70" cy="130" r="10" fill="#0D9E75"/>
        <circle cx="70" cy="130" r="4" fill="#fff"/>
        
        <!-- Pin B -->
        <circle cx="130" cy="70" r="10" fill="#FBBF24"/>
        <circle cx="130" cy="70" r="4" fill="#fff"/>
        
        <!-- Car -->
        <g transform="translate(90, 95) rotate(-30)">
          <rect x="-12" y="-7" width="24" height="14" rx="4" fill="#1a1a2e"/>
          <circle cx="-7" cy="9" r="3" fill="#555"/>
          <circle cx="7" cy="9" r="3" fill="#555"/>
        </g>
      </svg>

      <h1 class="auth-hero__title">Pasabay</h1>
      <p class="auth-hero__subtitle">Share rides with fellow Carolinians. Safe, affordable campus commutes.</p>
    </div>

    <!-- Feature Pills -->
    <div class="welcome-features">
      <div class="welcome-feature">
        <div class="welcome-feature__icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="welcome-feature__text">Verified<br>students only</span>
      </div>
      <div class="welcome-feature">
        <div class="welcome-feature__icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/>
          </svg>
        </div>
        <span class="welcome-feature__text">Cost-sharing<br>fares only</span>
      </div>
      <div class="welcome-feature">
        <div class="welcome-feature__icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </div>
        <span class="welcome-feature__text">Same route<br>matching</span>
      </div>
    </div>

    <!-- Spacer -->
    <div style="flex:1;"></div>

    <!-- Auth Buttons -->
    <div class="auth-buttons" style="padding-bottom:16px;">
      <a href="signup.html"><button class="btn btn--primary">Sign up</button></a>
      <a href="login.html"><button class="btn btn--outline">Log in</button></a>
      <div class="form-divider">
        <div class="form-divider__line"></div>
        <span class="form-divider__text">or</span>
        <div class="form-divider__line"></div>
      </div>
      <button class="btn btn--google">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Footer -->
    <div style="text-align:center;padding:0 24px 36px;">
      <p style="font-size:11px;color:var(--text-muted);line-height:1.5;">
        Restricted to <strong style="color:var(--text-secondary);">@usc.edu.ph</strong> email addresses
      </p>
    </div>
  </div>
</body>
</html>
