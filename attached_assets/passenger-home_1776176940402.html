<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasabay — Passenger Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone phone--dark">
    <!-- Map Background -->
    <div class="map-container">
      <div class="map-grid"></div>
      <!-- SVG Map Elements -->
      <svg width="390" height="844" viewBox="0 0 390 844" fill="none" style="position:absolute;inset:0">
        <!-- City blocks -->
        <rect x="20" y="60" width="120" height="90" rx="3" fill="rgba(255,255,255,0.02)"/>
        <rect x="160" y="80" width="100" height="120" rx="3" fill="rgba(255,255,255,0.025)"/>
        <rect x="280" y="50" width="90" height="80" rx="3" fill="rgba(255,255,255,0.015)"/>
        <rect x="30" y="180" width="140" height="110" rx="3" fill="rgba(255,255,255,0.018)"/>
        <rect x="200" y="230" width="160" height="90" rx="3" fill="rgba(255,255,255,0.022)"/>
        <rect x="40" y="320" width="100" height="130" rx="3" fill="rgba(255,255,255,0.025)"/>
        <rect x="170" y="350" width="80" height="100" rx="3" fill="rgba(255,255,255,0.015)"/>
        <rect x="270" y="310" width="100" height="130" rx="3" fill="rgba(255,255,255,0.02)"/>
        <rect x="20" y="480" width="160" height="80" rx="3" fill="rgba(255,255,255,0.018)"/>
        <rect x="210" y="470" width="120" height="100" rx="3" fill="rgba(255,255,255,0.022)"/>

        <!-- Major roads -->
        <line x1="0" y1="170" x2="390" y2="170" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
        <line x1="0" y1="310" x2="390" y2="310" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
        <line x1="0" y1="460" x2="390" y2="460" stroke="rgba(255,255,255,0.05)" stroke-width="2.5"/>
        <line x1="150" y1="0" x2="150" y2="600" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
        <line x1="260" y1="0" x2="260" y2="600" stroke="rgba(255,255,255,0.05)" stroke-width="2.5"/>

        <!-- Minor roads -->
        <line x1="0" y1="230" x2="150" y2="230" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>
        <line x1="0" y1="400" x2="260" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>
        <line x1="80" y1="170" x2="80" y2="460" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>
        <line x1="200" y1="80" x2="200" y2="310" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>
        <line x1="330" y1="100" x2="330" y2="460" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>
        <line x1="150" y1="250" x2="260" y2="250" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>

        <!-- Route glow -->
        <path d="M 195 500 L 195 400 Q 195 370 210 350 L 250 300 Q 260 285 260 270 L 260 180 Q 260 165 270 155 L 310 130" 
              stroke="rgba(13,158,117,0.2)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        
        <!-- Route line -->
        <path d="M 195 500 L 195 400 Q 195 370 210 350 L 250 300 Q 260 285 260 270 L 260 180 Q 260 165 270 155 L 310 130" 
              stroke="#0D9E75" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Status Bar -->
    <div class="status-bar status-bar--light" style="position:relative;z-index:10">
      <span class="status-bar__time">9:41</span>
      <div class="status-dots">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot"></span>
      </div>
    </div>

    <!-- Floating Search Bar -->
    <div style="position:relative;z-index:10;padding:4px 16px 0;">
      <div class="search-bar">
        <span class="search-bar__dot"></span>
        <input type="text" class="search-bar__input" placeholder="Where are you headed?" readonly>
        <button class="search-bar__btn">
          <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Nearby Badge -->
    <div style="position:relative;z-index:10;display:flex;justify-content:flex-end;padding:10px 16px 0;">
      <div class="nearby-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2m0 16v2m-10-10h2m16 0h2"/>
        </svg>
        2 drivers nearby
      </div>
    </div>

    <!-- Driver Marker -->
    <div class="driver-marker" style="left:90px;top:330px;">
      <div class="driver-marker__icon">
        <svg viewBox="0 0 24 24"><path d="M5 17h14l1-5H4l1 5zm2 2a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm10 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM3 10l2-5h14l2 5"/></svg>
      </div>
      <div class="driver-marker__label">Renz · ★4.9</div>
    </div>

    <!-- User Location Pin -->
    <div class="user-pin" style="left:182px;top:485px;">
      <div class="user-pin__pulse"></div>
      <div class="user-pin__dot"></div>
    </div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" style="padding-bottom:0;">
      <div class="bottom-sheet__handle"></div>

      <!-- Destination Row -->
      <div class="dest-row">
        <div class="dest-row__icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="dest-row__text">
          <div class="dest-row__label">Drop-off</div>
          <div class="dest-row__value">IT Park, Lahug</div>
        </div>
        <div class="fare-chip">
          <span>fare</span>
          <strong>₱18</strong>
        </div>
      </div>

      <!-- Stat Chips -->
      <div class="stat-chips">
        <div class="stat-chip">
          <div class="stat-chip__label">Distance</div>
          <div class="stat-chip__value">3.2 km</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip__label">Walk</div>
          <div class="stat-chip__value">~4 min</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip__label">ETA</div>
          <div class="stat-chip__value">~12 min</div>
        </div>
      </div>

      <!-- CTA Button -->
      <div style="padding:4px 0 16px;">
        <button class="btn btn--primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          Find a pasabay
        </button>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="passenger-home.html" class="bottom-nav__item bottom-nav__item--active">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          <span>Home</span>
        </a>
        <a href="history.html" class="bottom-nav__item">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span>History</span>
        </a>
        <a href="profile.html" class="bottom-nav__item">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Profile</span>
        </a>
      </nav>
    </div>
  </div>
</body>
</html>
