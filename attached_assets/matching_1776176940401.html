<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasabay — Finding a ride</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar__time">9:42</span>
      <div class="status-dots">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot"></span>
      </div>
    </div>

    <!-- Matching Content -->
    <div class="matching-screen">
      <!-- Pulsing Rings -->
      <div class="matching-rings">
        <div class="matching-ring"></div>
        <div class="matching-ring"></div>
        <div class="matching-ring"></div>
        <div class="matching-center">
          <svg viewBox="0 0 24 24">
            <path d="M5 17h14l1-5H4l1 5zm2 2a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm10 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM3 10l2-5h14l2 5"/>
          </svg>
        </div>
      </div>

      <div class="matching-text">Looking for a pasabay...</div>
      <p class="matching-subtext">Finding drivers heading to<br><strong style="color:var(--text-primary);">IT Park, Lahug</strong></p>

      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Fare info chip -->
      <div style="margin-top:32px;padding:16px 24px;background:var(--bg-offwhite);border-radius:14px;width:100%;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:12px;color:var(--text-secondary);">Estimated fare</span>
          <div class="fare-chip fare-chip--sm">₱18</div>
        </div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;text-align:center;">
            <div style="font-size:10px;color:var(--text-muted);">Distance</div>
            <div style="font-size:14px;font-weight:500;margin-top:2px;">3.2 km</div>
          </div>
          <div style="width:1px;background:var(--border-light);"></div>
          <div style="flex:1;text-align:center;">
            <div style="font-size:10px;color:var(--text-muted);">Walk</div>
            <div style="font-size:14px;font-weight:500;margin-top:2px;">~4 min</div>
          </div>
          <div style="width:1px;background:var(--border-light);"></div>
          <div style="flex:1;text-align:center;">
            <div style="font-size:10px;color:var(--text-muted);">ETA</div>
            <div style="font-size:14px;font-weight:500;margin-top:2px;">~12 min</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Cancel button at bottom -->
    <div style="padding:0 24px 16px;">
      <button class="btn btn--outline" style="color:var(--danger);border-color:var(--danger-light);">Cancel search</button>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="passenger-home.html" class="bottom-nav__item bottom-nav__item--active">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Home</span>
      </a>
      <a href="history.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>History</span>
      </a>
      <a href="profile.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </nav>
  </div>
</body>
</html>
