<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasabay — Match Found</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar__time">9:44</span>
      <div class="status-dots">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot"></span>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="page-scroll" style="padding: 0 20px;">

      <!-- Match Badge -->
      <div class="match-header">
        <div class="match-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          Match found!
        </div>
      </div>

      <!-- Driver Profile -->
      <div class="match-driver">
        <div class="avatar avatar--lg" style="background:#0D9E75;">RV</div>
        <div class="match-driver__name">Renz Villanueva</div>
        <div class="match-driver__rating">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#0D9E75" stroke="none">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/>
          </svg>
          4.9 · 142 rides
        </div>
      </div>

      <!-- Vehicle Info -->
      <div class="match-vehicle">
        <div class="match-vehicle__icon">
          <svg viewBox="0 0 24 24">
            <path d="M5 17h14l1-5H4l1 5zm2 2a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm10 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM3 10l2-5h14l2 5" fill="#555"/>
          </svg>
        </div>
        <div class="match-vehicle__info">
          <div class="match-vehicle__name">Toyota Vios · Silver</div>
          <div class="match-vehicle__plate">ABC 1234 · 2019</div>
        </div>
        <div class="badge badge--primary badge--lg">4 seats</div>
      </div>

      <!-- Pickup Location -->
      <div class="info-row">
        <div class="info-row__icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#0D9E75">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/>
          </svg>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px;">Pickup at</div>
          <div style="font-size:14px;font-weight:500;">USC Main Gate</div>
        </div>
        <div class="info-row__action">
          <div class="badge badge--primary">Walk ~3 min</div>
        </div>
      </div>

      <!-- Fare Display -->
      <div style="padding:16px 0;border-top:1px solid var(--border-lighter);">
        <div class="fare-display">
          <span class="fare-display__label">Your fare</span>
          <span style="flex:1"></span>
          <span class="fare-display__currency">₱</span>
          <span class="fare-display__amount">18</span>
          <span class="fare-display__fee">+ ₱7 <span style="font-size:10px;color:var(--text-muted);">fee</span></span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="btn-pair" style="padding-bottom:20px;">
        <button class="btn btn--outline" style="color:var(--danger);border-color:var(--danger-light);">Decline</button>
        <button class="btn btn--primary">Accept ride</button>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="passenger-home.html" class="bottom-nav__item bottom-nav__item--active">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Home</span>
      </a>
      <a href="history.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>History</span>
      </a>
      <a href="profile.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </nav>
  </div>
</body>
</html>
