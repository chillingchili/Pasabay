<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasabay — Splash</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .splash-loader {
      display: flex;
      gap: 6px;
      margin-top: 40px;
    }
    .splash-loader span {
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: splashDot 1.4s ease-in-out infinite;
    }
    .splash-loader span:nth-child(2) { animation-delay: 0.2s; }
    .splash-loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes splashDot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="phone" style="background:#0D9E75;">
    <div class="splash-screen">
      <!-- Logo Icon -->
      <svg class="splash-logo" viewBox="0 0 120 120" fill="none">
        <rect width="120" height="120" rx="30" fill="rgba(255,255,255,0.15)"/>
        <g transform="translate(25, 25)">
          <!-- Stylized pin/route icon -->
          <circle cx="35" cy="28" r="12" fill="#fff" opacity="0.9"/>
          <circle cx="35" cy="28" r="5" fill="#0D9E75"/>
          <path d="M35 40 L35 55 Q35 60 40 62 L55 62" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
          <circle cx="58" cy="62" r="4" fill="#FBBF24"/>
          <!-- Small car icon -->
          <rect x="14" y="48" width="18" height="10" rx="3" fill="rgba(255,255,255,0.6)"/>
          <circle cx="18" cy="60" r="2.5" fill="rgba(255,255,255,0.5)"/>
          <circle cx="28" cy="60" r="2.5" fill="rgba(255,255,255,0.5)"/>
        </g>
      </svg>

      <div class="splash-name">Pasabay</div>
      <div class="splash-tagline">Campus Commute</div>

      <div class="splash-loader">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
</body>
</html>
