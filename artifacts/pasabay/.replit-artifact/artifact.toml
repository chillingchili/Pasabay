kind = "mobile"
previewPath = "/"
title = "Pasabay"
version = "1.0.0"
id = "artifacts/pasabay"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24434

[services.development]
run = "pnpm --filter @workspace/pasabay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pasabay", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pasabay", "run", "serve" ]

[services.env]
PORT = "24434"
BASE_PATH = "/"
